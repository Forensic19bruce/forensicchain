<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3A5C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A56DB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundRect"><rect width="320" height="100" rx="14"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="14" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" clip-path="url(#roundRect)">
    <line x1="0" y1="20" x2="320" y2="20" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="40" x2="320" y2="40" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="60" x2="320" y2="60" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="80" x2="320" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="280" y1="0" x2="280" y2="100" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Glow behind icon -->
  <circle cx="50" cy="50" r="30" fill="#1A56DB" opacity="0.18"/>

  <!-- Microscope -->
  <g filter="url(#glow)" transform="translate(50,50)">
    <rect x="-4" y="-34" width="8" height="10" rx="2" fill="url(#iconGrad)"/>
    <rect x="-7" y="-38" width="14" height="5" rx="2.5" fill="url(#accentGrad)"/>
    <rect x="-3" y="-24" width="6" height="28" rx="2" fill="url(#iconGrad)"/>
    <rect x="-3" y="-2" width="22" height="5" rx="2" fill="url(#iconGrad)"/>
    <rect x="14" y="3" width="5" height="12" rx="2" fill="url(#accentGrad)"/>
    <ellipse cx="16.5" cy="16" rx="5" ry="3" fill="url(#accentGrad)" opacity="0.9"/>
    <rect x="-16" y="8" width="32" height="5" rx="2.5" fill="#2563EB"/>
    <rect x="-10" y="6" width="16" height="3" rx="1" fill="#60A5FA" opacity="0.7"/>
    <path d="M-14 13 L-18 28 L-10 28 Z" fill="#1A56DB" opacity="0.9"/>
    <path d="M14 13 L10 28 L18 28 Z" fill="#1A56DB" opacity="0.9"/>
    <rect x="-19" y="26" width="38" height="6" rx="3" fill="url(#iconGrad)"/>
    <circle cx="16.5" cy="22" r="1.5" fill="#38BDF8" opacity="0.8"/>
    <circle cx="16.5" cy="26" r="1" fill="#38BDF8" opacity="0.5"/>
  </g>

  <!-- Divider -->
  <line x1="95" y1="18" x2="95" y2="82" stroke="#1A56DB" stroke-width="1.5" opacity="0.6"/>

  <!-- FCMS -->
  <text x="112" y="46" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="34" font-weight="700" fill="#FFFFFF" letter-spacing="3" filter="url(#glow)">FCMS</text>
  <text x="113" y="67" font-family="'IBM Plex Sans', 'Arial', sans-serif" font-size="11" font-weight="500" fill="#60A5FA" letter-spacing="2.5">FORENSIC CHAIN MANAGEMENT</text>

  <!-- Accent dots -->
  <circle cx="113" cy="78" r="2" fill="#1A56DB"/>
  <circle cx="120" cy="78" r="2" fill="#2563EB"/>
  <circle cx="127" cy="78" r="2" fill="#38BDF8"/>

  <!-- Version badge -->
  <rect x="258" y="12" width="50" height="18" rx="9" fill="#1A56DB" opacity="0.8"/>
  <text x="283" y="25" font-family="'IBM Plex Mono', monospace" font-size="9" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">v7.0</text>
</svg>
